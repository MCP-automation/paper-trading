<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Trading Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0a0e17; 
            color: #e2e8f0; 
            font-size: 13px;
        }
        
        .app { max-width: 1400px; margin: 0 auto; padding: 16px; }
        
        /* Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 16px 20px;
            background: #1a2235;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #2a3548;
        }
        .header h1 { font-size: 20px; color: #3b82f6; }
        .price { font-size: 28px; font-weight: 700; color: #22c55e; font-family: monospace; }
        
        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: #1a2235;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2a3548;
        }
        .stat-val { font-size: 18px; font-weight: 700; }
        .stat-lbl { font-size: 11px; color: #64748b; margin-top: 4px; }

        /* Strategy Grid */
        .strat-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .strat-card {
            background: #1a2235;
            border-radius: 8px;
            padding: 14px;
            border: 1px solid #2a3548;
            position: relative;
        }
        .strat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 8px 8px 0 0;
        }
        .strat-card.s1::before { background: #3b82f6; }
        .strat-card.s2::before { background: #22c55e; }
        .strat-card.s3::before { background: #a855f7; }
        .strat-card.s4::before { background: #06b6d4; }
        .strat-card.s5::before { background: #f97316; }
        .strat-card.s6::before { background: #eab308; }
        
        .strat-name { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .strat-cap { font-size: 20px; font-weight: 700; font-family: monospace; }
        .strat-return { font-size: 12px; margin-top: 4px; }
        
        .pos { color: #22c55e; }
        .neg { color: #ef4444; }
        
        /* Toggle */
        .toggle { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a3548;
        }
        .toggle input { width: 18px; height: 18px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab {
            padding: 10px 16px;
            background: #1a2235;
            border: 1px solid #2a3548;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
        }
        .tab:hover { background: #252a40; }
        .tab.active { 
            background: #3b82f6; 
            color: #fff; 
            border-color: #3b82f6;
        }
        
        .order-input {
            background: #21262d;
            border: 1px solid #30363d;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
        }
        .order-input:focus { outline: none; border-color: #3b82f6; }
        
        /* Content */
        .content { display: none; }
        .content.active { display: block; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 1px solid #2a3548; color: #64748b; font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #1a2235; }
        tr:hover td { background: #1a2235; }
        
        .chip { padding: 3px 8px; border-radius: 10px; font-size: 10px; }
        .chip-long { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .chip-short { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .pnl-pos { color: #22c55e; }
        .pnl-neg { color: #ef4444; }
        
        @media (max-width: 1000px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .strat-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1>Paper Trading</h1>
            <div class="price" id="price">$---</div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-val" id="pnl">$0</div>
                <div class="stat-lbl">Total P&L</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="trades">0</div>
                <div class="stat-lbl">Total Trades</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="winrate">0%</div>
                <div class="stat-lbl">Win Rate</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="active-count">0</div>
                <div class="stat-lbl">Active</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="best">---</div>
                <div class="stat-lbl">Best</div>
            </div>
        </div>
        
        <!-- Strategies -->
        <div class="strat-grid" id="strategies"></div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
            <button class="tab" onclick="showTab('trades')">Trade History</button>
            <button class="tab" onclick="showTab('active')">Active Trades</button>
            <button class="tab" onclick="showTab('analytics')">Analytics</button>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard" class="content active">
            <h3 style="margin-bottom:12px;color:#64748b;">Strategy Details</h3>
            <div id="strat-details" style="background:#1a2235;border:1px solid #2a3548;border-radius:8px;padding:16px;">
                <p style="color:#64748b;">Loading strategy data...</p>
            </div>
        </div>
        
        <div id="active" class="content">
            <h3 style="margin-bottom:12px;color:#64748b;">Open Positions</h3>
            <div id="active-trades-list">
                <table>
                    <thead><tr><th>Strategy</th><th>Side</th><th>Entry</th><th>SL</th><th>TP</th><th>Live P&L</th><th>Time</th></tr></thead>
                    <tbody id="active-table"></tbody>
                </table>
            </div>
        </div>
        
        <div id="trades" class="content">
            <select id="strat-filter" onchange="loadTrades()" style="background:#21262d;color:#fff;padding:8px;border:1px solid #30363d;border-radius:4px;margin-bottom:12px;">
                <option value="all">All Strategies</option>
            </select>
            <div id="debug-info" style="font-size:11px;color:#666;margin-bottom:8px;"></div>
            <table>
                <thead>
                    <tr><th>Time</th><th>Strategy</th><th>Side</th><th>Entry</th><th>Exit</th><th>P&L</th></tr>
                </thead>
                <tbody id="trades-table"></tbody>
            </table>
        </div>
        
        <!-- Analytics -->
        <div id="analytics" class="content">
            <div class="stats-row">
                <div class="stat-box"><div class="stat-val" id="profit-factor">0</div><div class="stat-lbl">Profit Factor</div></div>
                <div class="stat-box"><div class="stat-val" id="sharpe">0</div><div class="stat-lbl">Sharpe Ratio</div></div>
            </div>
            <h3 style="margin:16px 0 12px;color:#64748b;">Strategy Performance</h3>
            <table id="strat-stats-table" style="width:100%;">
                <thead><tr><th>Strategy</th><th>Trades</th><th>Wins</th><th>Win Rate</th><th>Total P&L</th></tr></thead>
                <tbody id="strat-stats-body"></tbody>
            </table>
        </div>
    </div>

    <script>
    const API = '/api';
    let ws = null;
    
    function fmt(n) {
        if (n == null) return '---';
        return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
    
    function pct(n) {
        if (n == null) return '---';
        const s = n >= 0 ? '+' : '';
        return s + Number(n).toFixed(2) + '%';
    }
    
    function showTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
        
        if (tab === 'trades') loadTrades();
        if (tab === 'active') loadActiveTrades();
        if (tab === 'analytics') {
            loadAnalytics();
        }
    }
    
    function updatePrice(price) {
        document.getElementById('price').textContent = price ? '$' + Number(price).toLocaleString() : '$---';
        const chartText = document.getElementById('price-chart-text');
        if (chartText && price) {
            chartText.textContent = 'Current Price: $' + Number(price).toLocaleString();
        }
    }
    
    function renderStrategies(data) {
        const grid = document.getElementById('strategies');
        grid.innerHTML = '';
        
        const stratFilter = document.getElementById('strat-filter');
        // Save current selection to preserve it
        const currentSelection = stratFilter ? stratFilter.value : 'all';
        if (stratFilter) {
            stratFilter.innerHTML = '<option value="all">All Strategies</option>';
        }
        
        Object.entries(data).forEach(([key, d], i) => {
            const ret = d.return_pct || 0;
            const name = d.name || key;

            if (stratFilter) {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = name;
                if (key === currentSelection) opt.selected = true;
                stratFilter.appendChild(opt);
            }

            const el = document.createElement('div');
            el.className = 'strat-card s' + ((i % 5) + 1);
            el.innerHTML = `
                <div class="strat-name">${name}</div>
                <div class="strat-cap">${fmt(d.current_equity || 10000)}</div>
                <div class="strat-return ${ret >= 0 ? 'pos' : 'neg'}">${pct(ret)}</div>
                <div style="font-size:11px;color:#64748b;margin-top:6px;">
                    Trades: ${d.trade_count || 0} | Win: ${d.win_rate || 0}%
                </div>
                <div class="toggle">
                    <span style="font-size:10px;color:#64748b;">Active</span>
                    <input type="checkbox" ${d.enabled !== false ? 'checked' : ''} 
                        onchange="toggle('${key}')">
                </div>
            `;
            grid.appendChild(el);
        });
    }
    
    async function toggle(name) {
        try {
            await fetch(API + '/strategies/' + name + '/toggle', {method: 'POST'});
        } catch(e) { console.error(e); }
    }
    
    async function loadSummary() {
        try {
            const res = await fetch(API + '/summary');
            const data = await res.json();

            if (data.status) {
                updatePrice(data.status.live_price);

                // Render strategies from metrics_summary if available,
                // otherwise try /api/strategies for pre-warmup display
                const metrics = data.metrics_summary || {};
                if (Object.keys(metrics).length > 0) {
                    renderStrategies(metrics);
                    renderDashboardDetails(metrics);
                } else {
                    await loadStrategiesFromConfig();
                }

                if (data.total_stats) {
                    const ts = data.total_stats;
                    document.getElementById('pnl').textContent = fmt(ts.total_pnl);
                    document.getElementById('pnl').className = 'stat-val ' + (ts.total_pnl >= 0 ? 'pos' : 'neg');
                    document.getElementById('trades').textContent = ts.total_trades;
                    document.getElementById('winrate').textContent = (ts.win_rate || 0) + '%';
                    document.getElementById('best').textContent = ts.best_strategy || '---';
                }

                document.getElementById('active-count').textContent = data.active_trades?.length || 0;
            }
        } catch(e) { console.error(e); }
    }

    function renderDashboardDetails(metrics) {
        const container = document.getElementById('strat-details');
        if (!container) return;
        let html = '<table style="width:100%;"><thead><tr><th>Strategy</th><th>Equity</th><th>Return %</th><th>Trades</th><th>Win Rate</th><th>Status</th></tr></thead><tbody>';
        for (const [key, d] of Object.entries(metrics)) {
            const ret = d.return_pct || 0;
            const name = d.name || key;
            html += '<tr>';
            html += '<td>' + name + '</td>';
            html += '<td>' + fmt(d.current_equity) + '</td>';
            html += '<td class="' + (ret >= 0 ? 'pos' : 'neg') + '">' + pct(ret) + '</td>';
            html += '<td>' + (d.trade_count || 0) + '</td>';
            html += '<td>' + (d.win_rate || 0) + '%</td>';
            html += '<td>' + (d.enabled ? '<span style="color:#22c55e">ON</span>' : '<span style="color:#ef4444">OFF</span>') + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    // Load strategy cards from config endpoint (works before warmup)
    async function loadStrategiesFromConfig() {
        try {
            const res = await fetch(API + '/strategies');
            const strats = await res.json();
            // Convert to metrics_summary-compatible format
            const metricsLike = {};
            for (const [key, s] of Object.entries(strats)) {
                metricsLike[key] = {
                    name: s.name,
                    enabled: s.enabled,
                    current_equity: s.initial_capital,
                    return_pct: 0,
                    trade_count: 0,
                    win_rate: 0,
                };
            }
            renderStrategies(metricsLike);
        } catch(e) { console.error('Could not load strategies from config:', e); }
    }

    
    async function loadTrades() {
        try {
            const filter = document.getElementById('strat-filter')?.value || 'all';
            document.getElementById('debug-info').innerText = 'Loading... filter: ' + filter;
            
            const res = await fetch(API + '/trade-history?limit=48');
            let trades = await res.json();
            
            document.getElementById('debug-info').innerText = 'Got ' + trades.length + ' trades';
            
            // Filter by strategy if selected
            if (filter !== 'all') {
                trades = trades.filter(t => t.strategy === filter);
            }
            
            const tbody = document.getElementById('trades-table');
            
            if (!trades || trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:40px;">No trades found for this filter</td></tr>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < trades.length; i++) {
                const t = trades[i];
                const entryStr = t.entry ? '$' + Number(t.entry).toLocaleString() : '---';
                const exitStr = t.exit ? '$' + Number(t.exit).toLocaleString() : '---';
                const pnl = t.pnl || 0;
                const pnlStr = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toLocaleString();
                const timeStr = t.entry_time ? new Date(t.entry_time).toLocaleDateString() : '---';
                
                html += '<tr>';
                html += '<td>' + timeStr + '</td>';
                html += '<td>' + (t.strategy || 'N/A') + '</td>';
                html += '<td><span class="chip chip-long">' + (t.direction || 'LONG') + '</span></td>';
                html += '<td>' + entryStr + '</td>';
                html += '<td>' + exitStr + '</td>';
                html += '<td class="' + (pnl >= 0 ? 'pnl-pos' : 'pnl-neg') + '">' + pnlStr + '</td>';
                html += '</tr>';
            }
            
            tbody.innerHTML = html;
        } catch(e) {
            document.getElementById('debug-info').innerText = 'Error: ' + e.message;
            console.error('Error loading trades:', e);
        }
    }
    
    async function loadActiveTrades() {
        try {
            const res = await fetch(API + '/summary');
            const data = await res.json();
            
            const tbody = document.getElementById('active-table');
            const active = data.active_trades || [];
            
            if (active.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:20px;">No open positions</td></tr>';
                return;
            }
            
            let html = '';
            for (const t of active) {
                const livePnlStr = (t.current_pnl >= 0 ? '+$' : '-$') + Math.abs(t.current_pnl || 0).toLocaleString();
                html += '<tr>';
                html += '<td>' + t.strategy + '</td>';
                html += '<td><span class="chip ' + (t.direction === 'long' ? 'chip-long' : 'chip-short') + '">' + (t.direction || 'LONG').toUpperCase() + '</span></td>';
                html += '<td>$' + Number(t.entry_price || 0).toLocaleString() + '</td>';
                html += '<td style="color:#ef4444;">$' + Number(t.stop_loss || 0).toLocaleString() + '</td>';
                html += '<td style="color:#22c55e;">$' + Number(t.take_profit || 0).toLocaleString() + '</td>';
                html += '<td class="' + (t.current_pnl >= 0 ? 'pnl-pos' : 'pnl-neg') + '">' + livePnlStr + '</td>';
                html += '<td>' + new Date().toLocaleTimeString() + '</td>';
                html += '</tr>';
            }
            
            tbody.innerHTML = html;
        } catch(e) {
            console.error('Error loading active:', e);
            document.getElementById('active-table').innerHTML = '<tr><td colspan="6" style="color:red;">Error</td></tr>';
        }
    }
    
    async function loadAnalytics() {
        try {
            const res = await fetch(API + '/analytics');
            const data = await res.json();
            
            document.getElementById('profit-factor').textContent = data.profit_factor || 0;
            document.getElementById('sharpe').textContent = data.sharpe_ratio || 0;
            
            // Get all trades
            const tradesRes = await fetch(API + '/trade-history?limit=1000');
            const trades = await tradesRes.json();
            
            // Per strategy stats
            const stratStats = {};
            for (const t of trades || []) {
                if (!stratStats[t.strategy]) {
                    stratStats[t.strategy] = { trades: 0, wins: 0, pnl: 0 };
                }
                stratStats[t.strategy].trades++;
                if ((t.pnl || 0) > 0) stratStats[t.strategy].wins++;
                stratStats[t.strategy].pnl += (t.pnl || 0);
            }
            
            const tbody = document.getElementById('strat-stats-body');
            tbody.innerHTML = '';
            
            for (const [name, stats] of Object.entries(stratStats)) {
                const winRate = stats.trades > 0 ? Math.round(stats.wins / stats.trades * 100) : 0;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${name}</td>
                    <td>${stats.trades}</td>
                    <td>${stats.wins}</td>
                    <td>${winRate}%</td>
                    <td class="${stats.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt(stats.pnl)}</td>
                `;
                tbody.appendChild(row);
            }
        } catch(e) { console.error(e); }
    }
    
    function connectWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = location.host || '127.0.0.1:8000';
        
        ws = new WebSocket(protocol + '//' + host + '/api/ws/price');
        
        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'price' || msg.price) {
                    updatePrice(msg.price);
                } else if (msg.type === 'summary') {
                    const d = msg.data;
                    if (d.metrics_summary) renderStrategies(d.metrics_summary);
                }
            } catch(err) {}
        };
        
        ws.onclose = () => setTimeout(connectWS, 5000);
    }
    
    loadSummary();
    connectWS();
    // Auto-refresh summary every 30 seconds
    setInterval(loadSummary, 30000);

    </script>
</body>
</html>
